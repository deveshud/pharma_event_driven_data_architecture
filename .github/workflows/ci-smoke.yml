name: CI Smoke Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print repo info
        run: |
          echo "CI is running ✅"
          pwd
          ls -la
          echo "dbt folder:"
          ls -la dbt_transformations || true